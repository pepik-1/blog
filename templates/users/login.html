{% extends 'base.html' %}
{% block content %}

    <div class="w-4/12 border rounded-lg bg-white p-4 mx-auto">
        <h1 class="font-bold text-2xl">LogIn</h1>
        <p class="text-sm text-zinc-500 font-medium">Enter to create posts,comment and save to favorities</p>
        <form class="mt-4" action="">
            <div>
                <label for="username" class="block text-sm font-medium text-zinc-500" for="">Username</label>
                <input  id="username" name="username" class="w-full px-4 py-2 border-zinc-300 text-base rounded-lg" type="text" />


            </div>
        </form>
    </div>

        <div class="w-4/12 border rounded-lg bg-white p-4 mx-auto">
        <h1 class="font-bold text-2xl">Password</h1>
        <p class="text-sm text-zinc-500 font-medium">Enter to create posts,comment and save to favorities</p>
        <form class="mt-4" action="">
            <div>
                <label for="password" class="block text-sm font-medium text-zinc-500" for="">Password</label>
                <input  id="password" name="password" class="w-full px-4 py-2 border-zinc-300 text-base rounded-lg" type="text" />
                <button type="submit" class="h-11 flex items-center justify-center h-11 px-6 bg-black text-white text-base font-medium rounded-lg">
                    LogIn
                </button>
                <p class="mt-5 text-sm text-slate-600">No account? <a href="" class="text-blue-600">register</a></p>

            </div>
        </form>
    </div>
    
{% endblock %}
