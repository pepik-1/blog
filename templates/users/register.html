{% extends 'base.html' %}
{% block content %}


    
    <div class="w-4/12 border rounded-lg bg-white p-4 mx-auto">
        <h1 class="font-bold text-2xl">Register</h1>
        <p class="text-sm text-zinc-500 font-medium">Login to create posts,comment and save to favorities</p>
        <form class="mt-4" action="">
            <div>
                <div>
                    <label for="username" class=" block text-sm font-medium text-zinc-500" for="">Username</label>
                    <input placeholder="Username" id="username" name="username" class=" w-full px-4 py-2 border border-zinc-300 text-base rounded-lg" type="text" />
                
                </div>
                
                <div>
                   <label  for="email" class="block text-sm font-medium text-zinc-500" for="">Email</label>
                    <input placeholder="Email" id="email" name="email" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg" type="text" />
                 
                </div>
                <div>
                    <label  for="password" class="block text-sm font-medium text-zinc-500" for="">password</label>
                    <input placeholder="password" id="password" name="password" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg" type="text" />
                
                </div>
                <div>
                    <label for="password2" class="block text-sm font-medium text-zinc-500" for="">repeat password </label>
                    <input placeholder="password2" id="password2" name="password2" class="w-full px-4 py-2 border border-zinc-300 text-base rounded-lg" type="text" />
                
                </div>
                
                <button type="submit" class="h-11 flex items-center justify-center h-11 px-6 bg-black text-white text-base font-medium rounded-lg">
                    Register
                </button>
                <p class="mt-5 text-sm text-slate-600">already have an account? <a href="" class="text-blue-600">Login</a></p>

            </div>
        </form>
    </div>
    

{% endblock %}
